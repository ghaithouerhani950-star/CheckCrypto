<!DOCTYPE html>
<html>
<head>
    <title>CheckCrypto Pro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5968/5968260.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --neon: #deff9a; --bg: #000; --card: #111; --down: #f87171; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 140px; }
        
        .header { text-align: center; padding: 15px; width: 100%; border-bottom: 1px solid #222; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; }
        .header h1 { color: var(--neon); font-size: 18px; margin: 0; letter-spacing: 1px; }

        /* Promo Banner */
        .promo-banner { width: 92%; max-width: 450px; background: #1a1a1a; border: 1px solid var(--neon); padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; }
        .promo-banner a { color: var(--neon); font-size: 12px; font-weight: bold; text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 8px; }

        .status-bar { font-size: 9px; color: #555; margin-top: 10px; letter-spacing: 1px; }

        .dashboard { width: 92%; max-width: 450px; margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .crypto-card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; transition: background 0.4s ease; }

        .flash-up { background: rgba(222, 255, 154, 0.12) !important; }
        .flash-down { background: rgba(248, 113, 113, 0.12) !important; }

        .crypto-info { display: flex; align-items: center; gap: 12px; }
        .crypto-icon { font-size: 20px; color: var(--neon); width: 25px; text-align: center; }
        .crypto-name h2 { margin: 0; font-size: 14px; font-weight: 600; }
        .crypto-name span { font-size: 9px; color: #555; text-transform: uppercase; }

        .price-display { text-align: right; }
        .price-val { font-size: 15px; font-weight: bold; color: #f5f5f5; }
        .price-chg { font-size: 9px; margin-top: 2px; font-weight: bold; }

        .converter { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: #111; border-top: 2px solid var(--neon); padding: 15px; border-radius: 20px 20px 0 0; z-index: 20; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); box-sizing: border-box; }
        .input-row { display: flex; gap: 8px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; flex: 1; outline: none; font-size: 14px; }
        select { background: var(--neon); color: #000; font-weight: bold; border: none; flex: 0.4; }
        #res { margin-top: 12px; text-align: center; font-weight: bold; color: var(--neon); font-size: 16px; cursor: pointer; padding: 5px; border-radius: 5px; }

        .up { color: var(--neon); }
        .down { color: var(--down); }
        #toast { position: fixed; bottom: 145px; background: var(--neon); color: #000; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; display: none; z-index: 30; }
    </style>
</head>
<body>

    <div class="header">
        <h1>CHECKCRYPTO.COM</h1>
    </div>

    <div class="promo-banner">
        <a href="https://url.hk/i/en/aw72f" target="_blank">
            <i class="fa-solid fa-credit-card"></i> Get your Crypto Card now - Register here
        </a>
    </div>

    <div class="status-bar" id="status">Syncing Market...</div>
    <div class="dashboard" id="list"></div>
    <div id="toast">Copied to clipboard! ✅</div>

    <div class="converter">
        <div class="input-row">
            <input type="number" id="amt" placeholder="Amount in USD">
            <select id="sel"></select>
        </div>
        <div id="res" title="Click to copy">0.00</div>
    </div>

    <script>
        const coins = [
            { id: "BTC", name: "Bitcoin", sym: "BTCUSDT", icon: "fa-bitcoin" },
            { id: "ETH", name: "Ethereum", sym: "ETHUSDT", icon: "fa-ethereum" },
            { id: "BNB", name: "BNB", sym: "BNBUSDT", icon: "fa-coins" },
            { id: "SOL", name: "Solana", sym: "SOLUSDT", icon: "fa-bolt" },
            { id: "XRP", name: "Ripple", sym: "XRPUSDT", icon: "fa-xmark" },
            { id: "ADA", name: "Cardano", sym: "ADAUSDT", icon: "fa-circle-nodes" },
            { id: "DOGE", name: "Dogecoin", sym: "DOGEUSDT", icon: "fa-dog" },
            { id: "SHIB", name: "Shiba Inu", sym: "SHIBUSDT", icon: "fa-paw" },
            { id: "PEPE", name: "Pepe", sym: "PEPEUSDT", icon: "fa-frog" },
            { id: "TRX", name: "Tron", sym: "TRXUSDT", icon: "fa-circle-dollar-to-slot" },
            { id: "MATIC", name: "Polygon", sym: "MATICUSDT", icon: "fa-shapes" },
            { id: "DOT", name: "Polkadot", sym: "DOTUSDT", icon: "fa-ellipsis-vertical" },
            { id: "LINK", name: "Chainlink", sym: "LINKUSDT", icon: "fa-link" },
            { id: "LTC", name: "Litecoin", sym: "LTCUSDT", icon: "fa-circle-stop" }
        ];

        let prices = {};
        const list = document.getElementById('list');
        const sel = document.getElementById('sel');

        function init() {
            coins.forEach(c => {
                list.innerHTML += `
                    <div class="crypto-card" id="card-${c.id}">
                        <div class="crypto-info">
                            <i class="fa-solid ${c.icon} crypto-icon"></i>
                            <div class="crypto-name"><h2>${c.name}</h2><span>${c.id}/USDT</span></div>
                        </div>
                        <div class="price-display">
                            <div class="price-val" id="p-${c.id}">--</div>
                            <div class="price-chg" id="s-${c.id}">--</div>
                        </div>
                    </div>`;
                sel.innerHTML += `<option value="${c.id}">${c.id}</option>`;
                prices[c.sym] = 0;
            });
        }

        async function updateMarket() {
            if (document.hidden) return;
            try {
                const query = coins.map(c => `"${c.sym}"`).join(',');
                const response = await fetch(`https://api.binance.com/api/v3/ticker/price?symbols=[${query}]`);
                const data = await response.json();
                data.forEach(item => {
                    const id = item.symbol.replace('USDT', '');
                    const p = parseFloat(item.price);
                    const oldP = prices[item.symbol];
                    if (oldP !== 0 && oldP !== p) {
                        const isUp = p > oldP;
                        const st = document.getElementById(`s-${id}`);
                        const card = document.getElementById(`card-${id}`);
                        st.innerText = isUp ? "▲ UP" : "▼ DOWN";
                        st.className = "price-chg " + (isUp ? "up" : "down");
                        card.classList.add(isUp ? 'flash-up' : 'flash-down');
                        setTimeout(() => card.classList.remove('flash-up', 'flash-down'), 400);
                    }
                    document.getElementById(`p-${id}`).innerText = p < 0.01 ? p.toFixed(6) : p.toLocaleString(undefined, {minimumFractionDigits: 2});
                    prices[item.symbol] = p;
                });
                document.getElementById('status').innerText = "MARKET LIVE • " + new Date().toLocaleTimeString();
                calc();
            } catch (e) { document.getElementById('status').innerText = "RECONNECTING..."; }
        }

        function calc() {
            const v = parseFloat(document.getElementById('amt').value);
            const coin = sel.value;
            const p = prices[coin + 'USDT'];
            if (v > 0 && p > 0) document.getElementById('res').innerText = `${(v / p).toFixed(6)} ${coin}`;
        }

        document.getElementById('res').addEventListener('click', function() {
            const val = this.innerText.split(' ')[0];
            if (val !== "0.00") {
                navigator.clipboard.writeText(val);
                const t = document.getElementById('toast');
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 1500);
            }
        });

        document.getElementById('amt').addEventListener('input', calc);
        sel.addEventListener('change', calc);

        init();
        updateMarket();
        setInterval(updateMarket, 4000);
    </script>
</body>
</html>
